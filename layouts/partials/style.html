<style>
  :root {
    --width: 680px;
    --font-main: "Cormorant Garamond", "Georgia", serif;
    --font-secondary: "Lora", "Georgia", serif;
    --font-scale: 1.08em;
    --background-color: #e7e2dc;
    --background-color-alt: #ddd7cf;
    --heading-color: #2b2b2b;
    --text-color: #2b2b2b;
    --link-color: #2b2b2b;
    --visited-color: #5a5a5a;
    --blockquote-color: #4a4a4a;
  }

  body {
    font-family: var(--font-secondary);
    font-size: var(--font-scale);
    margin: auto;
    padding: 0 20px;
    max-width: var(--width);
    text-align: left;
    background: linear-gradient(to bottom, #e7e2dc, #ded8d1);
    background-attachment: fixed;
    word-wrap: break-word;
    overflow-wrap: break-word;
    overflow-x: hidden;
    line-height: 1.85;
    color: var(--text-color);
  }

  h1,
  h2,
  h3,
  h4,
  h5,
  h6 {
    font-family: var(--font-main);
    color: var(--heading-color);
    line-height: 1.3;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  a {
    color: var(--link-color);
    cursor: pointer;
    text-decoration: none;
    border-bottom: 1px solid rgba(43,43,43,0.3);
    transition: border-color 0.3s ease;
  }

  a:hover {
    border-bottom-color: rgba(43,43,43,0.7);
  }

  strong,
  b {
    color: var(--heading-color);
  }

  time {
    font-family: var(--font-secondary);
    font-style: italic;
    font-size: 0.9em;
    color: #777;
  }

  main {
    line-height: 1.85;
  }

  img {
    max-width: 100%;
  }

  code {
    font-family: monospace;
    padding: 2px;
    border-radius: 3px;
  }

  blockquote {
    border-left: 2px solid #ccc;
    color: var(--blockquote-color);
    padding-left: 20px;
    font-style: italic;
  }

  .post-entry {
    margin-left: calc(-50vw + 50%);
    margin-right: calc(-50vw + 50%);
    padding: 3em calc(50vw - 50%);
    transition: opacity 0.35s ease;
  }

  .post-entry--last {
    padding-bottom: 40px;
  }

  .post-entry--alt {
    background-color: var(--background-color-alt);
  }

  main:hover .post-entry {
    opacity: 0.55;
  }

  main:hover .post-entry:hover {
    opacity: 1;
  }

  .post-entry p {
    margin-bottom: 1.4em;
  }

  .post-entry h2 {
    margin-bottom: 0.2em;
    font-size: 1.8em;
  }

  .post-entry h2 a {
    color: var(--heading-color);
    border-bottom: none;
    position: relative;
  }

  .post-entry h2 a::after {
    content: "\2197";
    position: absolute;
    margin-left: 0.3em;
    opacity: 0;
    font-size: 0.5em;
    vertical-align: super;
    transition: opacity 0.3s ease;
  }

  .post-entry h2 a:hover {
    border-bottom: none;
  }

  .post-entry h2 a:hover::after {
    opacity: 0.35;
  }
</style>
